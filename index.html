<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Kecantikan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <div class="dashboard-container">
        <!--nama brand (header)-->
        <div class="header mb-4">
            <h2 class="fw-semibold">FNK Beauty</h2>
        </div>

        <!--Tabs-->
        <div class="all-tabs d-flex justify-content-between mb-3">
            <div class="tab-section1">
                <!--Button tambah barang-->
                <div class="add-stock-tab">
                    <button class="btn shadow-sm bg-body-tertiary rounded" type="button" style="background-color: white;">+ Tambah Stok</button>
                </div>
                <!--Tabs tambahan-->
                <div class="tabs">
                    <span style="color: #604d53;">All stock</span>
                    <span>Tersedia</span>
                    <span>Hampir Habis</span>
                    <span>Kosong</span>
                </div>
            </div>
            <div class="tab-section2">
                <!--Tab pencari-->
                <div class="search-tab">
                    <div class="container-fluid">
                        <form class="d-flex" role="search" style="gap: 10px;">
                            <input class="form-control" type="search" placeholder="Search" aria-label="Search"/>
                            <button class="btn" type="submit" style="border-color: #604d53; color: #604d53;">Cari</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!--Tabel-->
        <div class="tabel">
            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Nama</th>
                        <th>Brand</th>
                        <th>Kategori</th>
                        <th>Jumlah Stok</th>
                        <th>Harga</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>UV Shield Aqua Fresh Sunscreen SPF 50</td>
                        <td>Wardah</td>
                        <td>Sunscreen</td>
                        <td>12</td>
                        <td>Rp32.000</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="background-color: white;">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">Update</a></li>
                                    <li><a class="dropdown-item" href="#" style="color: red;">Delete</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Glow Deep Serum</td>
                        <td>Beauty of Joseon</td>
                        <td>Serum</td>
                        <td>13</td>
                        <td>Rp165.000</td>
                        <td>
                            <div class="dropdown">
                                <button class="btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false" style="background-color: white;">
                                    <i class="bi bi-three-dots-vertical"></i>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#">Update</a></li>
                                    <li><a class="dropdown-item" href="#" style="color: red;">Delete</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
